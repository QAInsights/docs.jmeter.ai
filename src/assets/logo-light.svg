<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="logo-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c" />
      <stop offset="100%" stop-color="#9a3412" />
    </linearGradient>
    <mask id="logo-mask-light">
      <!-- Entire canvas is visible by default -->
      <rect x="0" y="0" width="100" height="100" fill="#ffffff" />
      <!-- Vertical center vein/spine cutout -->
      <rect x="48.5" y="18" width="3" height="66" rx="1.5" fill="#000000" />
      <!-- Horizontal document lines cutouts on the right side -->
      <rect x="53" y="34" width="16" height="4" rx="2" fill="#000000" />
      <rect x="53" y="46" width="22" height="4" rx="2" fill="#000000" />
      <rect x="53" y="58" width="18" height="4" rx="2" fill="#000000" />
    </mask>
  </defs>
  <!-- Symmetrical organic leaf path with stem -->
  <path d="M 50,12 C 22,35 22,68 48.5,88 L 48.5,96 C 48.5,97.5 51.5,97.5 51.5,96 L 51.5,88 C 78,68 78,35 50,12 Z" fill="url(#logo-grad-light)" mask="url(#logo-mask-light)" />
</svg>