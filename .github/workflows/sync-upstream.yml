name: Sync Upstream JMeter Docs

on:
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sparse checkout JMeter xdocs
        run: |
          mkdir -p .tmp/jmeter
          cd .tmp/jmeter
          git init
          git remote add origin https://github.com/apache/jmeter.git
          git config core.sparseCheckout true
          echo "xdocs/" >> .git/info/sparse-checkout
          echo "NOTICE" >> .git/info/sparse-checkout
          echo "LICENSE" >> .git/info/sparse-checkout
          git pull --depth=1 origin master

      - name: Convert xdocs to MDX
        run: |
          JMETER_XDOCS=.tmp/jmeter/xdocs node tools/convert.mjs
        env:
          JMETER_XDOCS: .tmp/jmeter/xdocs

      - name: Copy NOTICE file
        run: |
          cp .tmp/jmeter/NOTICE public/NOTICE

      - name: Check for changes
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "changed_files=" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            # Capture the list of changed files for the failure report
            FILES=$(git diff --cached --name-only | head -50)
            # Write as a multi-line output value (use EOF delimiter)
            {
              echo "changed_files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Verify build passes
        if: steps.diff.outputs.changes == 'true'
        run: npm run build

      - name: Create PR with changes
        if: steps.diff.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          # Delete stale remote branch from earlier runs today (ignore error if absent)
          git push origin --delete "$BRANCH" || true
          git checkout -b "$BRANCH"
          git commit -m "chore: sync upstream JMeter documentation

          Automated sync from apache/jmeter master branch.
          - Converts xdocs XML to MDX
          - Updates images and screenshots
          - Updates NOTICE file"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync upstream JMeter documentation ($(date +%Y-%m-%d))" \
            --body "Automated sync from apache/jmeter master branch.

          This PR updates the documentation content by:
          - Converting upstream xdocs XML to MDX format
          - Updating images and screenshots
          - Updating the NOTICE file

          Build verification passed locally before PR creation.

          Please review and merge if the changes look correct." \
            --label "automated,sync"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Report no changes
        if: steps.diff.outputs.changes == 'false'
        run: echo "No upstream changes detected. Nothing to sync."

      - name: Cleanup
        if: always()
        run: rm -rf .tmp

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const changes = '${{ steps.diff.outputs.changes }}';
            const changedFiles = `${{ steps.diff.outputs.changed_files }}`;
            const hadUpstreamChanges = changes === 'true';

            let body = `The upstream sync workflow failed on ${new Date().toISOString()}.\n\n`;
            body += `[View run](${context.payload.repository.html_url}/actions/runs/${context.runId})\n\n`;

            if (hadUpstreamChanges) {
              body += `**Upstream changes were detected** but the workflow failed before a PR could be created.\n`;
              body += `The documentation is now out of date and needs manual intervention.\n\n`;
              body += `**Changed files (up to 50):**\n\`\`\`\n${changedFiles}\n\`\`\`\n\n`;
              body += `To resolve:\n`;
              body += `1. Check the failed step in the run log above.\n`;
              body += `2. Run \`node tools/convert.mjs\` locally with \`JMETER_XDOCS\` set to a fresh jmeter checkout.\n`;
              body += `3. Fix the converter or build issue, commit, and push.\n`;
              body += `4. Re-run the workflow via \`workflow_dispatch\` or wait for the next nightly run.\n`;
            } else {
              body += `**No upstream changes were detected.** The failure happened during conversion or build of existing content, not because of new upstream changes.\n\n`;
              body += `To resolve:\n`;
              body += `1. Check the failed step in the run log above.\n`;
              body += `2. This is likely a converter or environment issue, not a content sync issue.\n`;
            }

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: hadUpstreamChanges
              ? 'Sync workflow failed - upstream changes pending'
              : 'Sync workflow failed - no upstream changes',
              body,
              labels: ['bug', 'sync']
            })
